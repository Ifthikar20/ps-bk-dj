<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 1020" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#444"/>
    </marker>
    <marker id="arrowDash" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#6B5CE7"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1240" height="1020" fill="#FFFFFF"/>
  <text x="40" y="44" font-size="26" font-weight="800" fill="#1F1B2E">PlayStudy — publish a game to S3, it shows up &amp; scores sync (no App Store release)</text>

  <!-- ===================== LANE 1: PUBLISH ===================== -->
  <rect x="24" y="70" width="1192" height="210" rx="14" fill="#F4F2FF" stroke="#D9D2FF"/>
  <text x="44" y="100" font-size="15" font-weight="800" fill="#6B5CE7">1 · PUBLISH  (developer / CI — no app code, no release)</text>

  <rect x="48" y="120" width="180" height="120" rx="12" fill="#FFFFFF" stroke="#B9AEF5"/>
  <text x="138" y="170" font-size="15" font-weight="700" fill="#1F1B2E" text-anchor="middle">Developer / CI</text>
  <text x="138" y="194" font-size="12" fill="#555" text-anchor="middle">write game bundle</text>
  <text x="138" y="212" font-size="12" fill="#555" text-anchor="middle">(HTML + JS + assets)</text>

  <!-- arrow to S3 -->
  <line x1="228" y1="155" x2="430" y2="155" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="146" font-size="12" fill="#444" text-anchor="middle" font-weight="600">aws s3 sync</text>

  <!-- arrow to DB -->
  <line x1="228" y1="210" x2="800" y2="210" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="540" y="202" font-size="12" fill="#444" text-anchor="middle" font-weight="600">manage.py publish_game game.json</text>

  <!-- S3 box -->
  <rect x="430" y="118" width="330" height="92" rx="12" fill="#FFFFFF" stroke="#22C55E"/>
  <text x="448" y="142" font-size="14" font-weight="800" fill="#16893E">S3 / CloudFront  (games host)</text>
  <text x="448" y="164" font-size="12" fill="#333">playstudy-sdk.js</text>
  <text x="448" y="182" font-size="12" fill="#333">games/quiz-rush/index.html</text>
  <text x="448" y="200" font-size="12" fill="#333">games/word-pop/index.html · games/true-false/…</text>

  <!-- DB manifest box -->
  <rect x="800" y="150" width="392" height="90" rx="12" fill="#FFFFFF" stroke="#E0A21E"/>
  <text x="818" y="174" font-size="14" font-weight="800" fill="#B5790B">Postgres — Game manifest (one row per game)</text>
  <text x="818" y="196" font-size="12" fill="#333">key · slug · requires {quiz/words} · enabled · minAppVersion</text>
  <text x="818" y="214" font-size="12" fill="#333">served by  GET /api/v1/games</text>

  <!-- ===================== LANE 2: APP ===================== -->
  <rect x="24" y="300" width="1192" height="330" rx="14" fill="#F1F8F4" stroke="#CBE9D6"/>
  <text x="44" y="330" font-size="15" font-weight="800" fill="#16893E">2 · APP  (shipped to iOS once · same code on Web)  —  the shell never changes when you add games</text>

  <!-- manifest fetch -->
  <rect x="48" y="350" width="210" height="70" rx="12" fill="#FFFFFF" stroke="#9CC8AC"/>
  <text x="153" y="380" font-size="13" font-weight="700" fill="#1F1B2E" text-anchor="middle">On launch:</text>
  <text x="153" y="400" font-size="12" fill="#555" text-anchor="middle">GET /api/v1/games</text>

  <line x1="258" y1="385" x2="330" y2="385" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- registry -->
  <rect x="330" y="350" width="220" height="70" rx="12" fill="#FFFFFF" stroke="#9CC8AC"/>
  <text x="440" y="378" font-size="13" font-weight="700" fill="#1F1B2E" text-anchor="middle">GameRegistry</text>
  <text x="440" y="398" font-size="12" fill="#555" text-anchor="middle">register one card per game</text>

  <line x1="550" y1="385" x2="622" y2="385" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- UI cards -->
  <rect x="622" y="340" width="570" height="92" rx="12" fill="#FFFFFF" stroke="#9CC8AC"/>
  <text x="640" y="364" font-size="13" font-weight="800" fill="#1F1B2E">Shows as a card on every surface</text>
  <text x="640" y="386" font-size="12" fill="#444">🏠 Home games strip  ·  📚 Library  ·  📖 Study-set Games tab</text>
  <text x="640" y="406" font-size="12" fill="#444">(filtered by  requires  — e.g. a quiz game only shows on sets with quiz)</text>

  <!-- tap -> host -->
  <line x1="440" y1="420" x2="440" y2="470" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="455" y="450" font-size="12" fill="#444" font-weight="600">tap a card</text>

  <rect x="240" y="470" width="430" height="120" rx="12" fill="#FFFFFF" stroke="#6B5CE7"/>
  <text x="258" y="496" font-size="14" font-weight="800" fill="#6B5CE7">GameHostView  (one API, two embeds)</text>
  <text x="258" y="520" font-size="12" fill="#333">iOS → WebView      ·      Web → &lt;iframe&gt; (sandboxed)</text>
  <text x="258" y="544" font-size="12" fill="#333">injects quiz/words · listens for SDK events</text>
  <text x="258" y="568" font-size="12" fill="#333">a broken game fails inside its box — app stays alive</text>

  <!-- host loads bundle from S3 (dashed up to lane 1 S3) -->
  <path d="M595,470 C595,360 595,270 595,210" fill="none" stroke="#6B5CE7" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrowDash)"/>
  <text x="610" y="300" font-size="12" fill="#6B5CE7" font-weight="600">loads  games/&lt;slug&gt;/index.html  from S3</text>

  <!-- game runs box -->
  <rect x="720" y="470" width="472" height="120" rx="12" fill="#FFFFFF" stroke="#6B5CE7"/>
  <text x="738" y="496" font-size="14" font-weight="800" fill="#6B5CE7">Game bundle runs  (Phaser / Pixi / Canvas)</text>
  <text x="738" y="520" font-size="12" fill="#333">PlayStudyGame.onInit(m =&gt; …)   // gets quiz/words</text>
  <text x="738" y="544" font-size="12" fill="#333">PlayStudyGame.score(n)   ·   .reward(reason)</text>
  <text x="738" y="568" font-size="12" fill="#333">PlayStudyGame.gameover(finalScore)</text>

  <line x1="670" y1="530" x2="718" y2="530" stroke="#6B5CE7" stroke-width="2" marker-end="url(#arrowDash)"/>

  <!-- ===================== LANE 3: SCORE ===================== -->
  <rect x="24" y="650" width="1192" height="340" rx="14" fill="#FFF6F3" stroke="#F6D5C9"/>
  <text x="44" y="680" font-size="15" font-weight="800" fill="#D6552B">3 · SCORE  (server = single source of truth → reflects on iOS AND Web)</text>

  <!-- game emits -->
  <rect x="48" y="700" width="250" height="80" rx="12" fill="#FFFFFF" stroke="#F0B49B"/>
  <text x="173" y="730" font-size="13" font-weight="700" fill="#1F1B2E" text-anchor="middle">Game emits via SDK</text>
  <text x="173" y="752" font-size="12" fill="#555" text-anchor="middle">score / gameover / reward</text>

  <line x1="298" y1="740" x2="370" y2="740" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- app forwards -->
  <rect x="370" y="700" width="250" height="80" rx="12" fill="#FFFFFF" stroke="#F0B49B"/>
  <text x="495" y="726" font-size="13" font-weight="700" fill="#1F1B2E" text-anchor="middle">App forwards</text>
  <text x="495" y="748" font-size="12" fill="#555" text-anchor="middle">POST /games/sessions</text>
  <text x="495" y="766" font-size="12" fill="#555" text-anchor="middle">POST /rewards/activity</text>

  <line x1="620" y1="740" x2="692" y2="740" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- DB -->
  <rect x="692" y="700" width="250" height="80" rx="12" fill="#FFFFFF" stroke="#E0A21E"/>
  <text x="817" y="730" font-size="13" font-weight="800" fill="#B5790B" text-anchor="middle">Postgres (source of truth)</text>
  <text x="817" y="752" font-size="12" fill="#555" text-anchor="middle">GameSession.score · RewardProfile.points</text>

  <!-- DB to home both platforms -->
  <line x1="817" y1="780" x2="817" y2="840" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="833" y="815" font-size="12" fill="#444" font-weight="600">GET /me · /games/sessions</text>

  <rect x="360" y="840" width="900" height="120" rx="12" fill="none"/>
  <rect x="370" y="840" width="430" height="120" rx="12" fill="#FFFFFF" stroke="#F0B49B"/>
  <text x="585" y="868" font-size="14" font-weight="800" fill="#1F1B2E" text-anchor="middle">📱 iOS Home</text>
  <text x="585" y="894" font-size="12" fill="#444" text-anchor="middle">points · streak · rank</text>
  <text x="585" y="914" font-size="12" fill="#444" text-anchor="middle">per-game best score</text>
  <text x="585" y="940" font-size="12" fill="#16893E" text-anchor="middle" font-weight="700">read from server on open</text>

  <rect x="820" y="840" width="430" height="120" rx="12" fill="#FFFFFF" stroke="#F0B49B"/>
  <text x="1035" y="868" font-size="14" font-weight="800" fill="#1F1B2E" text-anchor="middle">💻 Web Home</text>
  <text x="1035" y="894" font-size="12" fill="#444" text-anchor="middle">same points · streak · rank</text>
  <text x="1035" y="914" font-size="12" fill="#444" text-anchor="middle">same per-game best score</text>
  <text x="1035" y="940" font-size="12" fill="#16893E" text-anchor="middle" font-weight="700">identical — comes from the server</text>

  <line x1="817" y1="900" x2="824" y2="900" stroke="#444" stroke-width="2"/>
  <text x="495" y="836" font-size="12" fill="#D6552B" font-weight="700" text-anchor="middle">score on one platform → stored once → shows on both</text>
</svg>
