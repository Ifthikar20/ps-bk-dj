<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Space Shooter</title>
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; height: 100%; overflow: hidden; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #05060f; user-select: none; }
      #c { display: block; width: 100%; height: 100%; touch-action: none; }
      .overlay { position: fixed; inset: 0; display: flex; align-items: center;
        justify-content: center; color: #fff; padding: 24px; text-align: center; }
      .card { background: rgba(12,14,30,.85); backdrop-filter: blur(6px);
        border-radius: 20px; padding: 22px; max-width: 460px; width: 100%; }
      .title { font-size: 26px; font-weight: 800; }
      .muted { color: #aab; font-size: 14px; }
      .prompt { font-size: 18px; font-weight: 700; margin: 6px 0 14px; }
      .choices { display: grid; gap: 10px; }
      .choice { background: rgba(255,255,255,.1); border: 2px solid transparent;
        border-radius: 14px; padding: 14px; font-size: 15px; color: #fff; text-align: left; cursor: pointer; }
      .choice.good { background: #22c55e; border-color: #fff; }
      .choice.bad { background: #ef4444; border-color: #fff; }
      .btn { background: #6b5ce7; color: #fff; font-weight: 800; border: none;
        border-radius: 999px; padding: 13px 26px; font-size: 16px; cursor: pointer; margin-top: 14px; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="ui" class="overlay">
      <div class="card">
        <div class="title">🚀 Space Shooter</div>
        <div class="muted">Move with ← →  (or drag). Space to fire.</div>
        <div class="muted">Clear a wave, answer a question to launch the next.</div>
        <button class="btn" id="start">Start</button>
      </div>
    </div>

    <script src="../../../playstudy-sdk.js"></script>
    <script>
      (function () {
        "use strict";
        var cv = document.getElementById("c"), ctx = cv.getContext("2d"), ui = document.getElementById("ui");
        var W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
        function resize() { W = cv.clientWidth; H = cv.clientHeight; cv.width = W * DPR; cv.height = H * DPR; ctx.setTransform(DPR, 0, 0, DPR, 0, 0); }
        window.addEventListener("resize", resize); resize();

        var quiz = [];
        PlayStudyGame.onInit(function (m) { quiz = (m.quiz || []).filter(function (q) { return q && q.prompt && q.choices; }); });

        var state = "ready"; // ready | play | quiz | over
        var ship, bullets, enemies, ebul, score, wave, lives, left, right, fireCd;

        function reset() {
          ship = { x: W / 2, y: H - 60, w: 34, s: 6 };
          bullets = []; ebul = []; enemies = []; score = 0; wave = 0; lives = 3;
          left = right = false; fireCd = 0;
        }
        function start() { reset(); spawnWave(); state = "play"; ui.classList.add("hidden"); }

        function spawnWave() {
          wave++;
          var cols = Math.min(8, 4 + Math.floor(wave / 2));
          var rows = Math.min(4, 2 + Math.floor(wave / 3));
          var pad = Math.min(64, W / (cols + 1));
          var ox = (W - (cols - 1) * pad) / 2;
          for (var r = 0; r < rows; r++)
            for (var c = 0; c < cols; c++)
              enemies.push({ x: ox + c * pad, y: 70 + r * 46, w: 24, alive: true });
          enemyDir = 1; enemyStep = 0.5 + wave * 0.15;
        }
        var enemyDir = 1, enemyStep = 0.6;

        function fire() { if (fireCd <= 0) { bullets.push({ x: ship.x, y: ship.y - 20 }); fireCd = 12; } }

        function nextWaveGate() {
          if (!quiz.length) { spawnWave(); state = "play"; return; }
          state = "quiz";
          var q = quiz[Math.floor(Math.random() * quiz.length)];
          var html = '<div class="card"><div class="muted">Clear check — answer to launch wave ' + (wave + 1) + '</div>' +
            '<div class="prompt">' + esc(q.prompt) + '</div><div class="choices">';
          q.choices.forEach(function (c, i) { html += '<button class="choice" data-i="' + i + '">' + esc(c) + '</button>'; });
          html += '</div></div>';
          ui.innerHTML = html; ui.classList.remove("hidden");
          var locked = false;
          ui.querySelectorAll(".choice").forEach(function (b) {
            b.onclick = function () {
              if (locked) return; locked = true;
              var i = +b.getAttribute("data-i"), ok = i === q.correctIndex;
              ui.querySelectorAll(".choice")[q.correctIndex].classList.add("good");
              if (!ok) b.classList.add("bad");
              setTimeout(function () {
                if (ok) { score += 25; PlayStudyGame.score(score); PlayStudyGame.reward("wave"); }
                else { loseLife(true); }
                if (state !== "over") { ui.classList.add("hidden"); spawnWave(); state = "play"; }
              }, 750);
            };
          });
        }

        function loseLife(silent) {
          lives--;
          if (lives <= 0) return end();
        }
        function end() {
          state = "over"; PlayStudyGame.gameover(score);
          ui.innerHTML = '<div class="card"><div class="title">Game over</div>' +
            '<div class="muted" style="font-size:20px;margin:8px 0">Score ' + score + ' · Wave ' + wave + '</div>' +
            '<button class="btn" id="again">Play again</button></div>';
          ui.classList.remove("hidden");
          document.getElementById("again").onclick = start;
        }

        function step() {
          if (state !== "play") return;
          if (fireCd > 0) fireCd--;
          if (left) ship.x -= ship.s; if (right) ship.x += ship.s;
          ship.x = Math.max(ship.w, Math.min(W - ship.w, ship.x));

          for (var i = bullets.length - 1; i >= 0; i--) { bullets[i].y -= 9; if (bullets[i].y < -10) bullets.splice(i, 1); }

          // enemy movement (sweep + descend)
          var minX = 1e9, maxX = -1e9, alive = 0;
          enemies.forEach(function (e) { if (e.alive) { alive++; minX = Math.min(minX, e.x); maxX = Math.max(maxX, e.x); } });
          if (alive === 0) { nextWaveGate(); return; }
          var drop = 0;
          if (maxX + enemyStep > W - 20 && enemyDir > 0) { enemyDir = -1; drop = 18; }
          else if (minX - enemyStep < 20 && enemyDir < 0) { enemyDir = 1; drop = 18; }
          enemies.forEach(function (e) { if (e.alive) { e.x += enemyDir * enemyStep; e.y += drop;
            if (Math.random() < 0.0009 * wave) ebul.push({ x: e.x, y: e.y + 16 });
            if (e.y + e.w > ship.y - 6 && Math.abs(e.x - ship.x) < ship.w) { e.alive = false; loseLife(); }
            if (e.y > H) { e.alive = false; loseLife(); }
          }});

          // bullet hits
          bullets.forEach(function (b) {
            enemies.forEach(function (e) {
              if (e.alive && Math.abs(b.x - e.x) < e.w && Math.abs(b.y - e.y) < e.w) {
                e.alive = false; b.y = -999; score += 5; PlayStudyGame.score(score);
              }
            });
          });
          // enemy bullets
          for (var j = ebul.length - 1; j >= 0; j--) { var eb = ebul[j]; eb.y += 5;
            if (eb.y > H) ebul.splice(j, 1);
            else if (Math.abs(eb.x - ship.x) < ship.w && Math.abs(eb.y - ship.y) < 18) { ebul.splice(j, 1); loseLife(); }
          }
        }

        function draw() {
          ctx.fillStyle = "#05060f"; ctx.fillRect(0, 0, W, H);
          // stars
          ctx.fillStyle = "rgba(255,255,255,.5)";
          for (var s = 0; s < 40; s++) { var sx = (s * 97) % W, sy = ((s * 53 + (Date.now() / 30)) % H); ctx.fillRect(sx, sy, 2, 2); }
          // ship
          if (state !== "ready") {
            ctx.fillStyle = "#8a7efa"; ctx.beginPath();
            ctx.moveTo(ship.x, ship.y - 18); ctx.lineTo(ship.x - ship.w, ship.y + 14); ctx.lineTo(ship.x + ship.w, ship.y + 14); ctx.fill();
            ctx.fillStyle = "#f7941d"; ctx.fillRect(ship.x - 4, ship.y + 14, 8, 8);
          }
          ctx.fillStyle = "#d6f26c"; bullets.forEach(function (b) { ctx.fillRect(b.x - 2, b.y - 8, 4, 12); });
          ctx.fillStyle = "#ff6b6e"; ebul.forEach(function (b) { ctx.fillRect(b.x - 2, b.y, 4, 10); });
          enemies.forEach(function (e) { if (e.alive) { ctx.fillStyle = "#22d3ee";
            ctx.fillRect(e.x - e.w / 2, e.y - e.w / 2, e.w, e.w);
            ctx.fillStyle = "#0e3a44"; ctx.fillRect(e.x - 6, e.y - 2, 4, 4); ctx.fillRect(e.x + 2, e.y - 2, 4, 4); } });
          if (state === "play") {
            ctx.fillStyle = "#fff"; ctx.font = "700 18px system-ui"; ctx.textAlign = "left";
            ctx.fillText("Score " + score, 16, 28);
            ctx.textAlign = "right"; ctx.fillText("♥".repeat(Math.max(0, lives)) + "  W" + wave, W - 16, 28);
          }
        }
        function loop() { requestAnimationFrame(loop); step(); draw(); }
        loop();

        function esc(s) { return String(s).replace(/[&<>"]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; }); }

        document.getElementById("start").onclick = start;
        window.addEventListener("keydown", function (e) {
          if (e.key === "ArrowLeft") left = true;
          else if (e.key === "ArrowRight") right = true;
          else if (e.key === " ") { e.preventDefault(); if (state === "ready") start(); else fire(); }
        });
        window.addEventListener("keyup", function (e) {
          if (e.key === "ArrowLeft") left = false; else if (e.key === "ArrowRight") right = false;
        });
        // pointer: drag to move, tap to fire
        cv.addEventListener("pointermove", function (e) { if (state === "play") { var r = cv.getBoundingClientRect(); ship.x = e.clientX - r.left; } });
        cv.addEventListener("pointerdown", function (e) { e.preventDefault(); if (state === "ready") start(); else { var r = cv.getBoundingClientRect(); ship.x = e.clientX - r.left; fire(); } });
        var autofire = setInterval(function () { if (state === "play") fire(); }, 260);
        window.addEventListener("unload", function () { clearInterval(autofire); });
      })();
    </script>
  </body>
</html>
