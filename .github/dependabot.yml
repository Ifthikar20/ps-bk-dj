version: 2
updates:
  # Python deps (security + patch updates only by default)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["deps", "python"]
    groups:
      django:
        patterns:
          - "Django*"
          - "djangorestframework*"
      celery:
        patterns:
          - "celery*"
          - "redis*"

  # Docker base image updates
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["deps", "docker"]

  # GitHub Actions used by workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["deps", "ci"]
